<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/master :: layout(~{::title}, ~{::section})}">
<title>Registro de Estudiante - OTEC PRIMAVERA</title>
<section>
    <div class="page-hero">
        <h1>Registrar estudiante</h1>
        <p class="text-muted mb-0">Incorpora nuevos estudiantes a la plataforma Primavera.</p>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="page-card p-4">
            <form th:action="@{/estudiantes}" th:object="${estudiante}" method="post">
                <div class="mb-3">
                    <label for="rut" class="form-label">RUT</label>
                    <input type="text" id="rut" th:field="*{rut}" class="form-control" th:classappend="${#fields.hasErrors('rut') ? 'is-invalid' : ''}">
                    <div class="invalid-feedback" th:errors="*{rut}"></div>
                </div>

                <div class="mb-3">
                    <label for="nombres" class="form-label">Nombres</label>
                    <input type="text" id="nombres" th:field="*{nombres}" class="form-control" th:classappend="${#fields.hasErrors('nombres') ? 'is-invalid' : ''}">
                    <div class="invalid-feedback" th:errors="*{nombres}"></div>
                </div>

                <div class="mb-3">
                    <label for="apellidos" class="form-label">Apellidos</label>
                    <input type="text" id="apellidos" th:field="*{apellidos}" class="form-control" th:classappend="${#fields.hasErrors('apellidos') ? 'is-invalid' : ''}">
                    <div class="invalid-feedback" th:errors="*{apellidos}"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email') ? 'is-invalid' : ''}">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="programa" class="form-label">Programa</label>
                    <input type="text" id="programa" th:field="*{programa}" class="form-control">
                </div>

                <div class="mb-3">
                    <label for="idCurso" class="form-label">Curso asignado</label>
                    <select id="idCurso" th:field="*{idCurso}" class="form-select">
                        <option value="">-- Seleccione un curso --</option>
                        <option th:each="curso : ${cursos}" th:value="${curso.idCurso}" th:text="${curso.nombre}"></option>
                    </select>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
                    <label class="form-check-label" for="activo">Estudiante activo</label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar estudiante</button>
                    <a th:href="@{/estudiantes}" class="btn btn-secondary">Volver</a>
                </div>
            </form>
            </div>
        </div>
    </div>
</section>
</html>
