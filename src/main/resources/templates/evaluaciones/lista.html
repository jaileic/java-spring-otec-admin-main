<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/master :: layout(~{::title}, ~{::section})}">
<title>Evaluaciones - OTEC PRIMAVERA</title>
<section>
    <div class="page-hero">
        <h1 class="mb-1">Evaluaciones</h1>
        <p class="text-muted mb-0">Consulta de notas y observaciones por curso.</p>
    </div>

    <div class="page-card p-4">
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Evaluación</th>
                <th>Tipo</th>
                <th>Estudiante</th>
                <th>Curso</th>
                <th>Fecha</th>
                <th>Nota</th>
                <th>Observación</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${evaluaciones}">
                <td th:text="${e.nombre}"></td>
                <td th:text="${e.tipo}"></td>
                <td th:text="${e.estudiante.nombres + ' ' + e.estudiante.apellidos}"></td>
                <td th:text="${e.curso != null ? e.curso.nombre : 'Sin curso'}"></td>
                <td th:text="${e.fechaEvaluacion}"></td>
                <td th:text="${#numbers.formatDecimal(e.nota, 1, 1)}"></td>
                <td th:text="${e.observacion}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${evaluaciones.isEmpty()}" class="alert alert-info">
        No hay evaluaciones registradas todavía.
    </div>
    </div>
</section>
</html>
