<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/master :: layout(~{::title}, ~{::section})}">
<title>Prácticas - OTEC PRIMAVERA</title>
<section>
    <div class="page-hero">
        <h1 class="mb-1">Prácticas</h1>
        <p class="text-muted mb-0">Seguimiento de actividades prácticas por estudiante.</p>
    </div>

    <div class="page-card p-4">
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Título</th>
                <th>Estudiante</th>
                <th>Curso</th>
                <th>Entrega</th>
                <th>Estado</th>
                <th>Detalle</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${practicas}">
                <td th:text="${p.titulo}"></td>
                <td th:text="${p.estudiante.nombres + ' ' + p.estudiante.apellidos}"></td>
                <td th:text="${p.curso != null ? p.curso.nombre : 'Sin curso'}"></td>
                <td th:text="${p.fechaEntrega}"></td>
                <td><span class="badge bg-info text-dark" th:text="${p.estado}"></span></td>
                <td th:text="${p.descripcion}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${practicas.isEmpty()}" class="alert alert-info">
        No hay prácticas registradas todavía.
    </div>
    </div>
</section>
</html>
