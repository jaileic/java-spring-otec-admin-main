<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/master :: layout(~{::title}, ~{::section})}">
<title>Relatores - OTEC Admin</title>
<section>
        <div class="row mb-4">
            <div class="col-md-8">
                <h1 class="mb-0">Gestión de Relatores</h1>
            </div>
            <div class="col-md-4 text-end">
                <a th:href="@{/relatores/nuevo}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Nuevo Relator
                </a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>RUT</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Email</th>
                        <th>Profesión/Título</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="relator : ${relatores}">
                        <td th:text="${relator.rut}"></td>
                        <td th:text="${relator.nombres}"></td>
                        <td th:text="${relator.apellidos}"></td>
                        <td th:text="${relator.email}"></td>
                        <td th:text="${relator.profesionTitulo}"></td>
                        <td>
                            <span th:if="${relator.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${relator.activo}" class="badge bg-secondary">Inactivo</span>
                        </td>
                        <td>
                            <a th:href="@{/relatores/{idRelator}/habilitaciones(idRelator=${relator.idRelator})}" class="btn btn-sm btn-info" title="Ver Habilitaciones">
                                <i class="bi bi-certificate"></i> Habilitaciones
                            </a>
                            <a th:href="@{/relatores/editar/{id}(id=${relator.idRelator})}" class="btn btn-sm btn-warning" title="Editar">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/relatores/eliminar/{id}(id=${relator.idRelator})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Está seguro de eliminar este relator?')" title="Eliminar">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${relatores.isEmpty()}" class="alert alert-info" role="alert">
            No hay relatores registrados. <a th:href="@{/relatores/nuevo}" class="alert-link">Crear uno nuevo</a>
        </div>
</section>
</html>
