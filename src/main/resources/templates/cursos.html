<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/master :: layout(~{::title}, ~{::section})}">
<title>Cursos - OTEC PRIMAVERA</title>
<section>
        <div class="page-hero">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="mb-1">Catálogo de Cursos</h1>
                    <p class="text-muted mb-0">Módulo académico central para OTEC PRIMAVERA.</p>
                </div>
                <div class="col-md-4 text-end">
                    <a th:href="@{/cursos/nuevo}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">
                        <i class="bi bi-plus-circle"></i> Nuevo Curso
                    </a>
                </div>
            </div>
        </div>

        <div class="page-card p-4">
        <div class="mb-3 d-flex gap-2 flex-wrap">
            <a th:href="@{/cursos/inactivos}" class="btn btn-outline-secondary">
                <i class="bi bi-archive"></i> Ver Archivo
            </a>
            <a th:href="@{/estudiantes}" class="btn btn-outline-primary">Estudiantes</a>
            <a th:href="@{/practicas}" class="btn btn-outline-primary">Prácticas</a>
            <a th:href="@{/evaluaciones}" class="btn btn-outline-primary">Evaluaciones</a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Código Interno</th>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Relator</th>
                        <th>Duración</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${cursos}">
                        <td th:text="${c.codigoInterno}"></td>
                        <td th:text="${c.codigo}"></td>
                        <td th:text="${c.nombre}"></td>
                        <td th:text="${c.nombreRelator}"></td>
                        <td th:text="${c.duracionHoras} + ' hrs'"></td>
                        <td th:text="${c.categoria}"></td>
                        <td>
                            <span th:if="${c.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${c.activo}" class="badge bg-secondary">Inactivo</span>
                        </td>
                        <td>
                            <a th:href="@{/cursos/editar/{id}(id=${c.idCurso})}" class="btn btn-sm btn-warning" title="Editar">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/cursos/eliminar/{id}(id=${c.idCurso})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Está seguro de enviar este curso al Archivo?')" title="Enviar al Archivo">
                                <i class="bi bi-trash"></i> Archivar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${cursos.isEmpty()}" class="alert alert-info" role="alert">
            No hay cursos activos. <a th:href="@{/cursos/nuevo}" class="alert-link">Crear uno nuevo</a>
        </div>
        </div>
</section>
</html>
